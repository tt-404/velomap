<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Live Opendata Map Zürich</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --panel: #ffffff;
    --panel-2: #f0ede5;
    --text: #1a1c20;
    --text-2: #3d4148;
    --muted: #7d8290;
    --accent: #d94a1f;
    --accent-2: #f4a82c;
    --good: #2a8c5a;
    --rain: #2563eb;
    --border: #e4e0d7;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%;
    font-family: 'Inter Tight', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    overflow: hidden; -webkit-text-size-adjust: 100%;
  }
  html, body { height: 100%; }
  body { height: 100dvh; }
  #app { display: flex; flex-direction: column; height: 100%; width: 100%; }

  header {
    flex: 0 0 auto;
    display: flex; flex-direction: column; gap: 6px;
    padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 8px;
  }
  header .stats {
    display: flex; gap: 12px; align-items: center;
    font-size: 11px; color: var(--muted); flex-wrap: wrap;
  }
  header .stats strong { color: var(--text); font-variant-numeric: tabular-nums; font-weight: 600; }
  .dot-live {
    width: 7px; height: 7px; border-radius: 50%; background: var(--good);
    box-shadow: 0 0 0 3px rgba(42,140,90,0.18); animation: pulse 1.6s infinite;
    display: inline-block; margin-right: 4px;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  #map-wrap { flex: 1 1 auto; position: relative; min-height: 0; width: 100%; }
  #map { position: absolute; inset: 0; background: var(--bg); }

  #timeline {
    flex: 0 0 auto;
    background: var(--panel);
    padding: 10px 14px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
  }
  .controls { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .controls button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
    touch-action: manipulation; -webkit-appearance: none;
    transition: all 0.12s;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .controls button.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
    font-weight: 700; padding: 8px 14px;
  }
  .controls .time {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 7px 10px; background: var(--panel-2);
    border-radius: 8px; border: 1px solid var(--border);
    flex: 1 1 100%; text-align: center; order: -1; color: var(--text-2);
  }

  .slider-wrap { position: relative; padding-top: 4px; }
  input[type="range"] {
    width: 100%; accent-color: var(--accent); cursor: pointer; height: 22px;
    -webkit-appearance: none; background: transparent;
    touch-action: pan-y;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 6px; background: var(--border); border-radius: 3px;
  }
  input[type="range"]::-moz-range-track {
    height: 6px; background: var(--border); border-radius: 3px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    margin-top: -8px; cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2); cursor: pointer;
  }

  /* === Tooltips (Hover-Labels) === */
  .station-tooltip {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    font-weight: 600; font-size: 12px;
    padding: 4px 10px !important;
    border-radius: 6px !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1) !important;
  }
  .station-tooltip::before { border-top-color: var(--border) !important; }

  /* === Popups === */
  .leaflet-popup-content-wrapper {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    padding: 0; overflow: hidden;
  }
  .leaflet-popup-tip { background: var(--panel); }
  .leaflet-popup-content { margin: 0; font-size: 13px; line-height: 1.5; min-width: 240px; }
  .popup-header {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .popup-header .title { font-size: 14px; font-weight: 700; margin: 0 0 2px; }
  .popup-header .id { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .popup-body { padding: 10px 14px 12px; }
  .popup-body .big {
    font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600;
    display: block; margin-top: 2px;
  }
  .popup-body .precip { margin-top: 6px; color: var(--rain); font-size: 12px; }
  .popup-body .ts { color: var(--muted); font-size: 11px; margin-top: 4px;
                     font-family: 'JetBrains Mono', monospace; }

  /* === Map Controls === */
  .legend, .layer-toggle {
    background: rgba(255, 255, 255, 0.95);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 10px; color: var(--text);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .legend strong, .layer-toggle strong {
    display: block; margin-bottom: 4px; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--muted); font-size: 9px; font-weight: 600;
  }
  .legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; }
  .layer-toggle label {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; padding: 3px 0; font-size: 11px;
  }
  .layer-toggle input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: var(--rain); cursor: pointer;
  }
  .layer-toggle .rain-icon {
    display: inline-block; width: 14px; height: 14px; border-radius: 50%;
    background: linear-gradient(135deg, #93c5fd 0%, #2563eb 100%);
  }
  .layer-toggle .parking-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; border-radius: 3px;
    background: #475569; color: #fff; font-size: 9px; font-weight: 700;
  }

  .layer-toggle .miv-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; border-radius: 50%;
    background: #7c3aed; color: #fff; font-size: 8px; font-weight: 700;
  }

  /* === MIV Marker === */
  .miv-div-icon {
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: 2px solid rgba(0,0,0,0.3);
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 9px; color: #fff; line-height: 1;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  /* === Parking Marker === */
  .parking-div-icon {
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; border: 2px solid rgba(0,0,0,0.35);
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 10px; color: #fff; line-height: 1;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }

  /* === Parking Popup === */
  .popup-parking-free {
    font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600;
    display: block; margin-top: 2px;
  }
  .popup-parking-status {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600; margin-top: 4px; text-transform: uppercase;
  }
  .popup-parking-status.open  { background: #dcfce7; color: #166534; }
  .popup-parking-status.closed { background: #fee2e2; color: #991b1b; }

  /* === Water Layer === */
  .layer-toggle .water-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; border-radius: 50%;
    background: #0ea5e9; color: #fff; font-size: 9px;
  }
  .water-chart-wrap {
    padding: 8px 14px 12px;
    border-top: 1px solid var(--border);
  }
  .water-chart-label {
    font-size: 10px; color: var(--muted); margin-bottom: 4px;
    display: flex; gap: 12px;
  }
  .water-chart-label span { display: flex; align-items: center; gap: 4px; }
  .water-chart-label .swatch {
    width: 20px; height: 3px; border-radius: 2px; display: inline-block;
  }
  .water-chart-wrap svg { display: block; width: 100%; }

  .leaflet-control-attribution {
    background: rgba(255,255,255,0.9) !important; color: var(--muted) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--accent) !important; }

  @media (min-width: 700px) {
    header { flex-direction: row; align-items: center; justify-content: space-between; padding: 14px 24px; }
    header h1 { font-size: 17px; }
    header .stats { font-size: 12px; gap: 18px; }
    #timeline { padding: 16px 24px 20px; }
    .controls .time { flex: 0 0 auto; order: 0; min-width: 240px; font-size: 13px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Live Opendata Map Zürich</h1>
    <div class="stats">
      <span><span class="dot-live"></span><span id="status">Lade…</span></span>
    </div>
  </header>
  <div id="map-wrap">
    <div id="map"></div>
  </div>
  <div id="timeline">
    <div class="controls">
      <span class="time" id="currentTime">–</span>
      <button id="play" class="primary">▶</button>
      <button data-step="-96">−1d</button>
      <button data-step="-4">−1h</button>
      <button data-step="-1">−15m</button>
      <button data-step="1">+15m</button>
      <button data-step="4">+1h</button>
      <button data-step="96">+1d</button>
    </div>
    <div class="slider-wrap">
      <input type="range" id="slider" min="0" max="671" step="1" value="671">
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  'use strict';

  var API = '';
  var stations = [];
  var stationsById = {};
  var stationMarkers = {};
  var veloOnMap = true;
  var snapshotsCache = new Map();
  var timeSlots = [];
  var currentIdx = 0;
  var playing = false;
  var playTimer = null;

  function colorFor(total) {
    if (total >= 100) return '#dc2626';
    if (total >= 40)  return '#d94a1f';
    if (total >= 10)  return '#f4a82c';
    return '#2a8c5a';
  }
  function radiusFor(total) {
    return 7 + Math.sqrt(total) * 1.6;
  }

  function buildPopupHtml(station, value, precip, ts) {
    var col = colorFor(value);
    var precipHtml = precip >= 0.1 ? '<div class="precip">☔ ' + precip.toFixed(1) + ' mm/h</div>' : '';
    var streetName = station.street_name || station.name || ('Station ' + station.id);
    var officialName = station.name && station.name !== streetName ? station.name : '';
    return '<div class="popup-header">' +
             '<div class="title">' + streetName + '</div>' +
             '<div class="id">' +
               (officialName ? officialName + ' · ' : '') +
               'ID ' + station.id +
               (station.abkuerzung ? ' · ' + station.abkuerzung : '') +
             '</div>' +
           '</div>' +
           '<div class="popup-body">' +
             '<div>Velos / 15 Min</div>' +
             '<span class="big" style="color:' + col + '">' + value + '</span>' +
             precipHtml +
             '<div class="ts">' + ts.toLocaleString('de-CH') + '</div>' +
           '</div>';
  }

  function initApp() {
    if (typeof L === 'undefined') { setTimeout(initApp, 100); return; }

    var map = L.map('map', { zoomControl: true, tap: true }).setView([47.378, 8.540], 13);

    L.tileLayer(
      'https://cartodb-basemaps-{s}.global.ssl.fastly.net/rastertiles/voyager/{z}/{x}/{y}.png',
      {
        attribution: '© OSM · CARTO · Velo: Stadt Zürich · Radar: MeteoSchweiz',
        maxZoom: 19
      }
    ).addTo(map);

    // === MeteoSwiss Radar-Overlay (OpenData RZC via Backend) ===
    var radarOverlay = null;
    var radarOnMap = false;
    var radarBounds = null;
    var radarDebounce = null;

    // Bounds einmalig laden
    fetch(API + '/api/radar/bounds')
      .then(function(r) { return r.json(); })
      .then(function(b) { radarBounds = b; })
      .catch(function(e) { console.warn('Radar-Bounds:', e); });

    function updateRadarOverlay(ts) {
      if (!radarOnMap || !radarBounds) return;
      clearTimeout(radarDebounce);
      radarDebounce = setTimeout(function() {
        var url = API + '/api/radar/image.png?at=' + encodeURIComponent(ts.toISOString());
        if (radarOverlay) map.removeLayer(radarOverlay);
        radarOverlay = L.imageOverlay(url, radarBounds, { opacity: 0.7, attribution: '© MeteoSchweiz' });
        radarOverlay.addTo(map);
      }, 300);
    }

    // === Parkhaus-Layer ===
    var parkingMarkers = {};
    var parkingOnMap = false;
    var parkingLayerGroup = L.layerGroup();
    var parkingRefreshTimer = null;

    function parkingColor(free, status) {
      if (status === 'closed') return '#94a3b8';
      if (free === null) return '#94a3b8';
      if (free > 50)  return '#2a8c5a';
      if (free > 10)  return '#f4a82c';
      return '#dc2626';
    }

    function buildParkingIcon(free, status) {
      var bg = parkingColor(free, status);
      var label = status === 'closed' ? 'P' : (free !== null ? String(free) : 'P');
      var size = label.length > 2 ? 36 : 28;
      return L.divIcon({
        className: '',
        html: '<div class="parking-div-icon" style="width:' + size + 'px;height:22px;background:' + bg + '">' + label + '</div>',
        iconSize: [size, 22],
        iconAnchor: [size / 2, 11],
        popupAnchor: [0, -14]
      });
    }

    function buildParkingChart(history) {
      var W = 260, H = 60;
      if (!history || history.length < 2) return '<p style="color:var(--muted);font-size:11px;padding:4px 0">Keine Verlaufsdaten</p>';
      var pts = history.filter(function(h) { return h.free !== null; });
      if (pts.length < 2) return '<p style="color:var(--muted);font-size:11px;padding:4px 0">Keine Verlaufsdaten</p>';
      var tsMin = new Date(pts[0].ts).getTime();
      var tsMax = new Date(pts[pts.length - 1].ts).getTime();
      var tsRange = tsMax - tsMin || 1;
      var vMin = Math.min.apply(null, pts.map(function(h) { return h.free; }));
      var vMax = Math.max.apply(null, pts.map(function(h) { return h.free; }));
      var vRange = vMax - vMin || 1;
      var path = pts.map(function(h, i) {
        var x = ((new Date(h.ts).getTime() - tsMin) / tsRange * W).toFixed(1);
        var y = (H - ((h.free - vMin) / vRange * (H - 8) + 4)).toFixed(1);
        return (i === 0 ? 'M' : 'L') + x + ',' + y;
      }).join(' ');
      // current-time marker = last data point
      var cx = W.toFixed(1);
      return '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" style="height:60px">' +
               '<path d="' + path + '" stroke="#2a8c5a" stroke-width="1.5" fill="none" opacity="0.9"/>' +
               '<line x1="' + cx + '" y1="0" x2="' + cx + '" y2="' + H + '" stroke="#d94a1f" stroke-width="1.5" stroke-dasharray="3,2"/>' +
             '</svg>';
    }

    function buildParkingPopup(g, history) {
      var col = parkingColor(g.free, g.status);
      var statusClass = g.status === 'open' ? 'open' : 'closed';
      var statusLabel = g.status === 'open' ? 'Offen' : 'Geschlossen';
      var ts = g.ts ? new Date(g.ts).toLocaleString('de-CH') : '–';
      return '<div class="popup-header">' +
               '<div class="title">' + g.name + '</div>' +
               '<div class="id">' + (g.address || '') + '</div>' +
             '</div>' +
             '<div class="popup-body">' +
               '<div>Freie Plätze</div>' +
               '<span class="popup-parking-free" style="color:' + col + '">' +
                 (g.free !== null ? g.free : '–') +
               '</span>' +
               '<div><span class="popup-parking-status ' + statusClass + '">' + statusLabel + '</span></div>' +
               '<div class="ts">' + ts + '</div>' +
             '</div>' +
             '<div class="water-chart-wrap">' +
               '<div class="water-chart-label">' +
                 '<span><span class="swatch" style="background:#2a8c5a"></span>Freie Plätze (7 Tage)</span>' +
               '</div>' +
               (history !== undefined ? buildParkingChart(history) : '<div style="font-size:11px;color:var(--muted)">Lade…</div>') +
             '</div>';
    }

    var parkingData = {};       // aktuellste angezeigte Daten pro slug
    var parkingSnapCache = new Map();
    var parkingDebounce = null;

    function _applyParkingGarages(garages, greyOutMissing) {
      var tsEl = document.getElementById('parkingTs');
      if (tsEl) tsEl.textContent = new Date().toLocaleTimeString('de-CH');
      var seen = {};
      garages.forEach(function(g) {
        if (!g.lat || !g.lon) return;
        seen[g.slug] = true;
        parkingData[g.slug] = g;
        if (parkingMarkers[g.slug]) {
          var m = parkingMarkers[g.slug];
          m.setIcon(buildParkingIcon(g.free, g.status));
          if (m.isPopupOpen()) m.setPopupContent(buildParkingPopup(g, m._history));
        } else {
          var m = L.marker([g.lat, g.lon], { icon: buildParkingIcon(g.free, g.status) });
          m._history = undefined;
          m.bindTooltip(g.name, { className: 'station-tooltip', direction: 'top', offset: [0, -14] });
          m.on('click', function() {
            var cur = parkingData[g.slug] || g;
            m.unbindPopup();
            m.bindPopup(buildParkingPopup(cur, m._history), { maxWidth: 320, minWidth: 260, closeButton: true }).openPopup();
            fetch(API + '/api/parking/history/' + g.slug)
              .then(function(r) { return r.json(); })
              .then(function(history) {
                m._history = history;
                if (m.isPopupOpen()) m.setPopupContent(buildParkingPopup(parkingData[g.slug] || g, history));
              });
          });
          parkingLayerGroup.addLayer(m);
          parkingMarkers[g.slug] = m;
        }
      });
      // Garagen ohne Daten zum gewählten Zeitpunkt ausgrauen
      if (greyOutMissing) {
        Object.keys(parkingMarkers).forEach(function(slug) {
          if (!seen[slug]) {
            parkingMarkers[slug].setIcon(buildParkingIcon(null, 'closed'));
          }
        });
      }
    }

    function _fetchLive(then) {
      fetch(API + '/api/parking', { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .then(then)
        .catch(function(e) { console.warn('Parking live:', e); });
    }

    function updateParkingLayer(ts) {
      if (!parkingOnMap) return;
      clearTimeout(parkingDebounce);
      parkingDebounce = setTimeout(function() {
        var noMarkers = Object.keys(parkingMarkers).length === 0;
        var now = new Date();
        var isLive = (now - ts) < 5 * 60 * 1000;

        if (isLive || noMarkers) {
          // Live-Daten holen (auch beim ersten Load immer, egal wo Slider steht)
          _fetchLive(function(garages) {
            _applyParkingGarages(garages, false);
            // Wenn Slider auf historischer Zeit: danach noch Snapshot drüberlagern
            if (!isLive) _applySnapshot(ts);
          });
        } else {
          _applySnapshot(ts);
        }
      }, 150);
    }

    function _applySnapshot(ts) {
      var key = ts.toISOString();
      if (parkingSnapCache.has(key)) {
        var cached = parkingSnapCache.get(key);
        _applyParkingGarages(cached, cached.length > 0);
        return;
      }
      fetch(API + '/api/parking/snapshot?at=' + encodeURIComponent(key))
        .then(function(r) { return r.json(); })
        .then(function(garages) {
          parkingSnapCache.set(key, garages);
          // Nur ausgrauen wenn wir tatsächlich Daten haben (sonst Live-Stand behalten)
          _applyParkingGarages(garages, garages.length > 0);
        })
        .catch(function(e) { console.warn('Parking snapshot:', e); });
    }

    function refreshParking() {
      updateParkingLayer(new Date());
    }

    // === MIV-Layer (National / Kantonal / Kommunal) ===
    var mivStations = [];
    var mivStationsById = {};
    var mivVisible = { national: false, kantonal: false, kommunal: false };
    var mivGroups = {
      national: L.layerGroup(),
      kantonal: L.layerGroup(),
      kommunal: L.layerGroup()
    };
    var mivGroupColors = { national: '#dc2626', kantonal: '#7c3aed', kommunal: '#a855f7' };
    var mivSnapshotCache = new Map();
    var mivDebounce = null;

    function mivRadius(total) { return 6 + Math.sqrt(total) * 0.5; }

    function buildMivPopup(station, total, ts) {
      var col = mivGroupColors[station.road_class] || '#7c3aed';
      var classLabel = { national: 'Nationalstrasse', kantonal: 'Kantonsstrasse', kommunal: 'Gemeindestrasse' }[station.road_class] || '';
      return '<div class="popup-header">' +
               '<div class="title">' + (station.street || station.name) + '</div>' +
               '<div class="id">' + station.name + ' · ' + classLabel + '</div>' +
             '</div>' +
             '<div class="popup-body">' +
               '<div>Fahrzeuge / Stunde</div>' +
               '<span class="big" style="color:' + col + '">' + total + '</span>' +
               '<div class="ts">' + ts.toLocaleString('de-CH') + '</div>' +
             '</div>';
    }

    function fetchMivSnapshot(ts) {
      var hour = new Date(ts);
      hour.setMinutes(0, 0, 0);
      var key = hour.toISOString();
      if (mivSnapshotCache.has(key)) return Promise.resolve(mivSnapshotCache.get(key));
      return fetch(API + '/api/miv/snapshot?at=' + encodeURIComponent(key) + '&window=3600')
        .then(function(r) { return r.json(); })
        .then(function(rows) {
          var m = new Map();
          rows.forEach(function(r) { m.set(r.station_id, r.total); });
          mivSnapshotCache.set(key, m);
          return m;
        })
        .catch(function() { return new Map(); });
    }

    function updateMivLayer(ts) {
      var anyOn = mivVisible.national || mivVisible.kantonal || mivVisible.kommunal;
      if (!anyOn || mivStations.length === 0) return;
      clearTimeout(mivDebounce);
      mivDebounce = setTimeout(function() {
        fetchMivSnapshot(ts).then(function(snap) {
          ['national', 'kantonal', 'kommunal'].forEach(function(cls) {
            if (!mivVisible[cls]) return;
            mivGroups[cls].clearLayers();
            var col = mivGroupColors[cls];
            mivStations.filter(function(st) { return st.road_class === cls; }).forEach(function(st) {
              if (!st.lat || !st.lon) return;
              var total = snap.get(st.id) || 0;
              var m = L.circleMarker([st.lat, st.lon], {
                radius: mivRadius(total),
                color: col, weight: 1.5,
                fillColor: col, fillOpacity: 0.8
              });
              m.bindTooltip((st.street || st.name), {
                className: 'station-tooltip', direction: 'top', offset: [0, -8]
              });
              m.bindPopup(buildMivPopup(st, total, ts), { maxWidth: 280, minWidth: 220 });
              mivGroups[cls].addLayer(m);
            });
          });
        });
      }, 300);
    }

    // === Wasser-Layer ===
    var waterStations = [];
    var waterStationsById = {};
    var waterTempOnMap = false;
    var waterLevelOnMap = false;
    var waterTempGroup = L.layerGroup();
    var waterLevelGroup = L.layerGroup();
    var waterSnapCache = new Map();
    var waterDebounce = null;

    function waterTempColor(t) {
      if (t === null) return '#94a3b8';
      if (t >= 20) return '#ef4444';
      if (t >= 15) return '#f97316';
      if (t >= 10) return '#f59e0b';
      if (t >= 5)  return '#38bdf8';
      return '#818cf8';
    }
    function waterLevelColor(h) {
      if (h === null) return '#94a3b8';
      return '#0ea5e9';
    }

    function buildWaterChart(history, currentTs) {
      var W = 260, H = 80;
      if (!history || history.length < 2) return '<p style="color:var(--muted);font-size:11px;padding:4px 0">Keine Verlaufsdaten</p>';
      var tsMin = new Date(history[0].ts).getTime();
      var tsMax = new Date(history[history.length - 1].ts).getTime();
      var tsRange = tsMax - tsMin || 1;
      function xFor(ts) { return ((new Date(ts).getTime() - tsMin) / tsRange * W).toFixed(1); }

      var tempPts = history.filter(function(h) { return h.temperature !== null; });
      var levelPts = history.filter(function(h) { return h.height !== null; });

      var svgParts = ['<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" style="height:80px">'];

      // Temperatur-Linie
      if (tempPts.length > 1) {
        var tMin = Math.min.apply(null, tempPts.map(function(h) { return h.temperature; }));
        var tMax = Math.max.apply(null, tempPts.map(function(h) { return h.temperature; }));
        var tRange = tMax - tMin || 1;
        var tPath = tempPts.map(function(h, i) {
          var x = xFor(h.ts);
          var y = (H - ((h.temperature - tMin) / tRange * (H - 8) + 4)).toFixed(1);
          return (i === 0 ? 'M' : 'L') + x + ',' + y;
        }).join(' ');
        svgParts.push('<path d="' + tPath + '" stroke="#f97316" stroke-width="1.5" fill="none" opacity="0.9"/>');
      }

      // Wasserstand-Linie
      if (levelPts.length > 1) {
        var lMin = Math.min.apply(null, levelPts.map(function(h) { return h.height; }));
        var lMax = Math.max.apply(null, levelPts.map(function(h) { return h.height; }));
        var lRange = lMax - lMin || 1;
        var lPath = levelPts.map(function(h, i) {
          var x = xFor(h.ts);
          var y = (H - ((h.height - lMin) / lRange * (H - 8) + 4)).toFixed(1);
          return (i === 0 ? 'M' : 'L') + x + ',' + y;
        }).join(' ');
        svgParts.push('<path d="' + lPath + '" stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.9"/>');
      }

      // Aktuelle-Zeit-Markierung
      var cx = ((currentTs.getTime() - tsMin) / tsRange * W).toFixed(1);
      if (cx >= 0 && cx <= W) {
        svgParts.push('<line x1="' + cx + '" y1="0" x2="' + cx + '" y2="' + H + '" stroke="#d94a1f" stroke-width="1.5" stroke-dasharray="3,2"/>');
      }

      svgParts.push('</svg>');
      return svgParts.join('');
    }

    function buildWaterPopup(st, snap, currentTs, history) {
      var temp = snap ? snap.temperature : null;
      var height = snap ? snap.height : null;
      var ts = snap ? new Date(snap.ts).toLocaleString('de-CH') : '–';
      var tempStr = temp !== null ? temp.toFixed(1) + ' °C' : '–';
      var heightStr = height !== null ? height.toFixed(0) + ' cm' : '–';
      var tempCol = waterTempColor(temp);
      return '<div class="popup-header">' +
               '<div class="title">' + st.name + '</div>' +
               '<div class="id">' + st.water_body + ' · ' + (st.water_type === 'lake' ? 'See' : 'Fliessgewässer') + '</div>' +
             '</div>' +
             '<div class="popup-body">' +
               '<div style="display:flex;gap:20px;margin-bottom:4px">' +
                 '<div><div style="font-size:10px;color:var(--muted)">Temperatur</div>' +
                   '<span style="font-family:JetBrains Mono,monospace;font-size:20px;font-weight:600;color:' + tempCol + '">' + tempStr + '</span></div>' +
                 '<div><div style="font-size:10px;color:var(--muted)">Wasserstand</div>' +
                   '<span style="font-family:JetBrains Mono,monospace;font-size:20px;font-weight:600;color:#0ea5e9">' + heightStr + '</span></div>' +
               '</div>' +
               '<div class="ts">' + ts + '</div>' +
             '</div>' +
             '<div class="water-chart-wrap">' +
               '<div class="water-chart-label">' +
                 '<span><span class="swatch" style="background:#f97316"></span>Temp. (°C)</span>' +
                 '<span><span class="swatch" style="background:#0ea5e9"></span>Stand (cm)</span>' +
               '</div>' +
               (history ? buildWaterChart(history, currentTs) : '<div style="font-size:11px;color:var(--muted)">Lade…</div>') +
             '</div>';
    }

    function fetchWaterSnapshot(ts) {
      var key = ts.toISOString();
      if (waterSnapCache.has(key)) return Promise.resolve(waterSnapCache.get(key));
      return fetch(API + '/api/water/snapshot?at=' + encodeURIComponent(key) + '&window=1800')
        .then(function(r) { return r.json(); })
        .then(function(rows) {
          var m = new Map();
          rows.forEach(function(r) { m.set(r.station_id, r); });
          waterSnapCache.set(key, m);
          return m;
        })
        .catch(function() { return new Map(); });
    }

    function _updateWaterGroup(group, snap, mode, ts) {
      group.clearLayers();
      waterStations.forEach(function(st) {
        if (!st.lat || !st.lon) return;
        var reading = snap.get(st.id);
        var val = reading ? (mode === 'temp' ? reading.temperature : reading.height) : null;
        var col = mode === 'temp' ? waterTempColor(val) : waterLevelColor(val);
        var label = val !== null ? (mode === 'temp' ? val.toFixed(1) : val.toFixed(0)) : '?';
        var size = label.length > 3 ? 38 : 32;
        var icon = L.divIcon({
          className: '',
          html: '<div class="miv-div-icon" style="width:' + size + 'px;height:20px;font-size:9px;background:' + col + '">' + label + '</div>',
          iconSize: [size, 20], iconAnchor: [size / 2, 10], popupAnchor: [0, -12]
        });
        var m = L.marker([st.lat, st.lon], { icon: icon });
        var tooltip = st.name + ' · ' + st.water_body;
        m.bindTooltip(tooltip, { className: 'station-tooltip', direction: 'top', offset: [0, -12] });

        // Popup: öffnen → history nachladen
        m.on('click', function() {
          var reading = waterSnapCache.has(ts.toISOString()) ? waterSnapCache.get(ts.toISOString()).get(st.id) : null;
          m.bindPopup(buildWaterPopup(st, reading, ts, null), { maxWidth: 320, minWidth: 260, closeButton: true }).openPopup();
          fetch(API + '/api/water/history/' + st.id)
            .then(function(r) { return r.json(); })
            .then(function(history) {
              if (m.isPopupOpen()) {
                m.setPopupContent(buildWaterPopup(st, reading, ts, history));
              }
            });
        });

        group.addLayer(m);
      });
    }

    function updateWaterLayer(ts) {
      if (!waterTempOnMap && !waterLevelOnMap) return;
      clearTimeout(waterDebounce);
      waterDebounce = setTimeout(function() {
        fetchWaterSnapshot(ts).then(function(snap) {
          if (waterTempOnMap)  _updateWaterGroup(waterTempGroup, snap, 'temp', ts);
          if (waterLevelOnMap) _updateWaterGroup(waterLevelGroup, snap, 'level', ts);
        });
      }, 300);
    }

    function _loadWaterStations(cb) {
      if (waterStations.length > 0) { cb(); return; }
      fetch(API + '/api/water/stations').then(function(r) { return r.json(); }).then(function(rows) {
        waterStations = rows;
        rows.forEach(function(st) { waterStationsById[st.id] = st; });
        cb();
      });
    }

    var LayerToggle = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function() {
        var div = L.DomUtil.create('div', 'layer-toggle');
        div.innerHTML =
          '<strong>Layer</strong>' +
          '<label>' +
            '<input type="checkbox" id="toggleVelo" checked>' +
            '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#d94a1f;border:1.5px solid #1a1c20"></span>' +
            '<span>Velo</span>' +
          '</label>' +
          '<label>' +
            '<input type="checkbox" id="toggleRain">' +
            '<span class="rain-icon"></span>' +
            '<span>Regen-Radar</span>' +
          '</label>' +
          '<label>' +
            '<input type="checkbox" id="toggleParking">' +
            '<span class="parking-icon">P</span>' +
            '<span>Parkhäuser <span id="parkingTs" style="font-size:9px;color:var(--muted);font-weight:400"></span></span>' +
          '</label>' +
          '<label>' +
            '<input type="checkbox" id="toggleMivNational">' +
            '<span class="miv-icon" style="background:#dc2626">N</span>' +
            '<span>MIV National</span>' +
          '</label>' +
          '<label>' +
            '<input type="checkbox" id="toggleMivKantonal">' +
            '<span class="miv-icon" style="background:#7c3aed">K</span>' +
            '<span>MIV Kantonal</span>' +
          '</label>' +
          '<label>' +
            '<input type="checkbox" id="toggleMivKommunal">' +
            '<span class="miv-icon" style="background:#a855f7">G</span>' +
            '<span>MIV Kommunal</span>' +
          '</label>' +
          '<label>' +
            '<input type="checkbox" id="toggleWaterTemp">' +
            '<span class="water-icon">🌡</span>' +
            '<span>Wassertemp.</span>' +
          '</label>' +
          '<label>' +
            '<input type="checkbox" id="toggleWaterLevel">' +
            '<span class="water-icon">〜</span>' +
            '<span>Wasserstand</span>' +
          '</label>';
        L.DomEvent.disableClickPropagation(div);
        return div;
      }
    });
    new LayerToggle().addTo(map);
    setTimeout(function() {
      document.getElementById('toggleVelo').addEventListener('change', function(e) {
        veloOnMap = e.target.checked;
        Object.keys(stationMarkers).forEach(function(id) {
          var m = stationMarkers[id];
          if (veloOnMap) {
            m.addTo(map);
          } else {
            map.removeLayer(m);
          }
        });
      });

      document.getElementById('toggleRain').addEventListener('change', function(e) {
        radarOnMap = e.target.checked;
        if (e.target.checked) {
          updateRadarOverlay(timeSlots[currentIdx]);
        } else {
          if (radarOverlay) map.removeLayer(radarOverlay);
        }
      });
      document.getElementById('toggleParking').addEventListener('change', function(e) {
        parkingOnMap = e.target.checked;
        if (e.target.checked) {
          parkingLayerGroup.addTo(map);
          refreshParking();
          parkingRefreshTimer = setInterval(refreshParking, 60000);
        } else {
          clearInterval(parkingRefreshTimer);
          parkingRefreshTimer = null;
          map.removeLayer(parkingLayerGroup);
        }
      });
      ['national', 'kantonal', 'kommunal'].forEach(function(cls) {
        var idMap = { national: 'toggleMivNational', kantonal: 'toggleMivKantonal', kommunal: 'toggleMivKommunal' };
        document.getElementById(idMap[cls]).addEventListener('change', function(e) {
          mivVisible[cls] = e.target.checked;
          if (e.target.checked) {
            mivGroups[cls].addTo(map);
            if (mivStations.length === 0) {
              fetch(API + '/api/miv/stations').then(function(r) { return r.json(); }).then(function(rows) {
                mivStations = rows;
                rows.forEach(function(st) { mivStationsById[st.id] = st; });
                updateMivLayer(timeSlots[currentIdx]);
              });
            } else {
              updateMivLayer(timeSlots[currentIdx]);
            }
          } else {
            mivGroups[cls].clearLayers();
            map.removeLayer(mivGroups[cls]);
          }
        });
      });

      document.getElementById('toggleWaterTemp').addEventListener('change', function(e) {
        waterTempOnMap = e.target.checked;
        if (e.target.checked) {
          waterTempGroup.addTo(map);
          _loadWaterStations(function() { updateWaterLayer(timeSlots[currentIdx]); });
        } else {
          waterTempGroup.clearLayers();
          map.removeLayer(waterTempGroup);
        }
      });

      document.getElementById('toggleWaterLevel').addEventListener('change', function(e) {
        waterLevelOnMap = e.target.checked;
        if (e.target.checked) {
          waterLevelGroup.addTo(map);
          _loadWaterStations(function() { updateWaterLayer(timeSlots[currentIdx]); });
        } else {
          waterLevelGroup.clearLayers();
          map.removeLayer(waterLevelGroup);
        }
      });
    }, 50);

    var legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<strong>Velos / 15min</strong>' +
        '<div class="row"><span class="dot" style="background:#2a8c5a"></span> 0–10</div>' +
        '<div class="row"><span class="dot" style="background:#f4a82c"></span> 10–40</div>' +
        '<div class="row"><span class="dot" style="background:#d94a1f"></span> 40–100</div>' +
        '<div class="row"><span class="dot" style="background:#dc2626"></span> 100+</div>';
      return div;
    };
    legend.addTo(map);

    setTimeout(function() { map.invalidateSize(); }, 100);
    setTimeout(function() { map.invalidateSize(); }, 500);
    window.addEventListener('resize', function() { map.invalidateSize(); });
    window.addEventListener('orientationchange', function() {
      setTimeout(function() { map.invalidateSize(); }, 300);
    });

    // === Stationen laden und Marker setzen ===
    fetch(API + '/api/stations').then(function(r) { return r.json(); }).then(function(results) {
      stations = results;

      stations.forEach(function(st) {
        stationsById[st.id] = st;
        var m = L.circleMarker([st.lat, st.lon], {
          radius: 8, color: '#1a1c20', weight: 1.5, fillColor: '#999', fillOpacity: 0.9
        });

        m.bindTooltip(st.street_name || st.name || ('Station ' + st.id), {
          className: 'station-tooltip',
          direction: 'top',
          offset: [0, -8],
          sticky: false
        });

        // Klick: Popup mit Detail + Street View
        m.on('click', function() {
          openStationPopup(map, m, st);
        });

        if (veloOnMap) m.addTo(map);
        stationMarkers[st.id] = m;
      });

      buildTimeline();
      render(currentIdx);
      updateStatus();
    }).catch(function(e) {
      document.getElementById('status').textContent = 'Fehler: ' + e.message;
      console.error(e);
    });

    function openStationPopup(map, marker, station) {
      var ts = timeSlots[currentIdx];
      var snap = snapshotsCache.get(ts.toISOString()) || new Map();
      var data = snap.get(station.id) || { velo: 0, precip: 0 };
      marker.bindPopup(
        buildPopupHtml(station, data.velo, data.precip, ts),
        { maxWidth: 300, minWidth: 240, closeButton: true }
      ).openPopup();
    }

    function buildTimeline() {
      var now = new Date();
      now.setMinutes(Math.floor(now.getMinutes() / 15) * 15, 0, 0);
      timeSlots = [];
      for (var i = 7 * 96 - 1; i >= 0; i--) {
        timeSlots.push(new Date(now.getTime() - i * 15 * 60 * 1000));
      }
      var slider = document.getElementById('slider');
      slider.max = timeSlots.length - 1;
      slider.value = timeSlots.length - 1;
      currentIdx = timeSlots.length - 1;
    }

    function fetchSnapshot(ts) {
      var key = ts.toISOString();
      if (snapshotsCache.has(key)) return Promise.resolve(snapshotsCache.get(key));
      return Promise.all([
        fetch(API + '/api/snapshot?at=' + encodeURIComponent(key) + '&window=900')
          .then(function(r) { return r.json(); }),
        fetch(API + '/api/precip/snapshot?at=' + encodeURIComponent(key) + '&window=1800')
          .then(function(r) { return r.json(); })
          .catch(function() { return []; })
      ]).then(function(results) {
        var m = new Map();
        for (var i = 0; i < results[0].length; i++) {
          var row = results[0][i];
          m.set(row.station_id, { velo: row.total, precip: 0 });
        }
        for (var j = 0; j < results[1].length; j++) {
          var row = results[1][j];
          var existing = m.get(row.station_id) || { velo: 0, precip: 0 };
          existing.precip = row.value;
          m.set(row.station_id, existing);
        }
        snapshotsCache.set(key, m);
        return m;
      });
    }

    function render(idx) {
      currentIdx = idx;
      var ts = timeSlots[idx];
      if (!ts) return;
      document.getElementById('currentTime').textContent =
        ts.toLocaleString('de-CH', {
          weekday: 'short', day: '2-digit', month: '2-digit',
          hour: '2-digit', minute: '2-digit'
        });

      updateRadarOverlay(ts);
      updateMivLayer(ts);
      updateWaterLayer(ts);
      updateParkingLayer(ts);

      fetchSnapshot(ts).then(function(snap) {
        Object.keys(stationMarkers).forEach(function(idStr) {
          var id = parseInt(idStr, 10);
          var marker = stationMarkers[id];
          var data = snap.get(id) || { velo: 0, precip: 0 };
          var borderColor = data.precip > 0.1 ? '#2563eb' : '#1a1c20';
          var borderWeight = data.precip > 0.1 ? Math.min(4, 1.5 + data.precip * 0.5) : 1.5;
          marker.setStyle({
            fillColor: colorFor(data.velo),
            radius: radiusFor(data.velo),
            color: borderColor,
            weight: borderWeight,
          });

          if (marker.isPopupOpen()) {
            marker.setPopupContent(buildPopupHtml(stationsById[id], data.velo, data.precip, ts));
          }
        });
      });
    }

    // === Controls ===
    var slider = document.getElementById('slider');
    slider.addEventListener('input', function(e) { render(parseInt(e.target.value, 10)); });

    var stepButtons = document.querySelectorAll('[data-step]');
    for (var b = 0; b < stepButtons.length; b++) {
      (function(btn) {
        btn.addEventListener('click', function() {
          var step = parseInt(btn.getAttribute('data-step'), 10);
          var newIdx = Math.max(0, Math.min(timeSlots.length - 1, currentIdx + step));
          slider.value = newIdx;
          render(newIdx);
        });
      })(stepButtons[b]);
    }

    var playBtn = document.getElementById('play');
    playBtn.addEventListener('click', function() {
      playing = !playing;
      playBtn.textContent = playing ? '⏸' : '▶';
      if (playing) {
        playTimer = setInterval(function() {
          var next = currentIdx + 1;
          if (next > timeSlots.length - 1) next = 0;
          slider.value = next;
          render(next);
        }, 200);
      } else {
        clearInterval(playTimer);
      }
    });

    // Tastatursteuerung
    document.addEventListener('keydown', function(e) {
      // Nicht auslösen wenn Fokus in einem Input/Select-Feld liegt
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      var step = 0;
      if (e.code === 'Space') {
        e.preventDefault();
        playBtn.click();
        return;
      }
      if (e.code === 'ArrowRight') { step = e.shiftKey ? 4 : 1; }
      if (e.code === 'ArrowLeft')  { step = e.shiftKey ? -4 : -1; }
      if (step === 0) return;
      e.preventDefault();
      var newIdx = Math.max(0, Math.min(timeSlots.length - 1, currentIdx + step));
      slider.value = newIdx;
      render(newIdx);
    });

    function updateStatus() {
      fetch(API + '/health').then(function(r) { return r.json(); }).then(function(h) {
        var msg = h.stations + ' Stationen · ' + h.counts.toLocaleString('de-CH') + ' Messwerte';
        if (h.precip_values) msg += ' · ' + h.precip_values.toLocaleString('de-CH') + ' Regen-Werte';
        document.getElementById('status').textContent = msg;
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp);
  } else {
    initApp();
  }
})();
</script>
</body>
</html>
