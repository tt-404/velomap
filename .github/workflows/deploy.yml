name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd ${{ secrets.PI_PATH }}
          git pull origin main

      - name: Rebuild and restart containers
        run: |
          cd ${{ secrets.PI_PATH }}
          docker compose up --build -d
          docker image prune -f
